; Toolchain prefetch stub — keep in sync with beeplan-edge/platformio.ini envs/libs.
[platformio]
default_envs = ttgo-t-energy

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
build_flags =
  -D BEEPLAN_PROTO_VERSION=2
lib_deps =
  bblanchon/ArduinoJson@^7
  bogde/HX711@^0.7.5
  milesburton/DallasTemperature@^3.11.0
  paulstoffregen/OneWire@^2.3.8

[env:esp32dev]
board = esp32dev

[env:ttgo-t-energy]
extends = env:esp32dev
build_flags =
  ${env.build_flags}
  -D BEEPLAN_BOARD_T_ENERGY=1

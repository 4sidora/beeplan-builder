; Toolchain prefetch stub — keep in sync with beeplan-gateway/platformio.ini envs/libs.
[platformio]
default_envs = ttgo-t-call-v14

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps =
  bblanchon/ArduinoJson@^7

[env:esp32dev]
board = esp32dev

[env:ttgo-t-call-v14]
extends = env:esp32dev
build_flags =
  -D BEEPLAN_BOARD_TTGO_T_CALL=1
lib_deps =
  ${env.lib_deps}
  vshymanskyy/TinyGSM@^0.12.0
  arduino-libraries/ArduinoHttpClient@^0.6.1
